<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpactFlow Operations Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f2ed; --panel:rgba(255,255,255,.88); --line:#e5dbcf; --text:#3b2f28; --muted:#7a6b61;
      --sage:#5b8a5b; --sage-dark:#3d5a3d; --clay:#d4a574; --blue:#3f6f9a; --warn:#b7791f; --danger:#b24134;
      --shadow:0 16px 40px rgba(56, 44, 36, .10); --radius:22px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .shell{max-width:1400px;margin:0 auto;padding:24px}
    .glass{background:var(--panel);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow)}
    .topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:16px 20px;border-radius:20px;position:sticky;top:12px;z-index:20}
    .brand{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:50%;background:var(--sage);color:#fff;display:grid;place-items:center;font-weight:700}
    h1,h2,h3{font-family:"Playfair Display",serif;margin:0}.subtitle{font-size:12px;color:var(--muted);margin-top:2px}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,input,textarea,button{font:inherit}
    .field, .btn{height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;padding:0 12px;color:var(--text)}
    .field[type="date"]{padding-right:8px}
    .btn{cursor:pointer;font-weight:600}.btn-primary{background:var(--sage);color:#fff;border-color:var(--sage)}.btn-primary:hover{background:var(--sage-dark)}
    .btn-soft{background:#fff}.btn-danger{background:#fff0ed;color:var(--danger);border-color:#f0cfc8}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:20px;margin-top:20px}
    .sidebar{border-radius:22px;padding:18px;height:calc(100vh - 130px);position:sticky;top:96px;overflow:auto}
    .nav-btn{display:flex;width:100%;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:14px;border:0;background:transparent;color:var(--text);cursor:pointer;font-weight:600}
    .nav-btn.active,.nav-btn:hover{background:#fff}
    .main{min-width:0}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{padding:18px;border-radius:18px}.card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.card .value{font-size:30px;font-weight:700;margin-top:8px}
    .grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;margin-top:20px}
    .panel{padding:18px;border-radius:22px}.panel h3{margin-bottom:14px}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
    .list{display:flex;flex-direction:column;gap:12px}.item{padding:14px;border-radius:16px;background:#fff;border:1px solid var(--line)}
    .row{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
    .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}.pill{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .pill.active{background:#e4f0e4;color:#2f5b2f}.pill.planning{background:#e8f0f7;color:#325679}.pill.paused,.pill.waiting{background:#fff4df;color:#966816}.pill.complete,.pill.completed{background:#e8ecef;color:#4f5b66}.pill.blocked,.pill.overdue{background:#fdeae6;color:#a34033}.pill.in_progress{background:#eef6ee;color:#386538}.pill.not_started{background:#f1ece6;color:#7a6b61}.pill.high{background:#fdeae6;color:#a34033}.pill.medium{background:#fff4df;color:#966816}.pill.low{background:#ecf5ec;color:#386538}
    table{width:100%;border-collapse:collapse} th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top} th{font-size:12px;text-transform:uppercase;color:var(--muted)}
    .hidden{display:none !important}.muted{color:var(--muted)} .small{font-size:13px}.empty{padding:26px;color:var(--muted);text-align:center;background:#fff;border:1px dashed var(--line);border-radius:16px}
    .modal-wrap{position:fixed;inset:0;background:rgba(34,27,23,.35);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}.modal{width:min(760px,100%);max-height:90vh;overflow:auto;border-radius:24px;padding:20px}
    .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.form-grid .full{grid-column:1/-1} textarea.field{height:auto;padding:12px}
    .toast{position:fixed;right:16px;bottom:16px;background:var(--sage);color:#fff;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:50}
    @media (max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{height:auto;position:static}.cards{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
    @media (max-width:700px){.shell{padding:12px}.cards{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.topbar{position:static}.toolbar{width:100%}.field{width:100%}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar glass">
      <div class="brand">
        <div class="logo">IF</div>
        <div>
          <h1>ImpactFlow Operations Hub</h1>
          <div class="subtitle">Shared project tracking and communication center</div>
        </div>
      </div>
      <div class="toolbar">
        <select id="currentUser" class="field"></select>
        <button class="btn btn-soft" onclick="openModal('teamModal')">Team</button>
        <button class="btn btn-soft" onclick="seedData()">Load Sample</button>
        <button class="btn btn-primary" onclick="openModal('projectModal')">New Project</button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar glass">
        <button class="nav-btn active" data-view="home">Home <span id="navHomeCount" class="small muted"></span></button>
        <button class="nav-btn" data-view="mywork">My Work <span id="navMyCount" class="small muted"></span></button>
        <button class="nav-btn" data-view="projects">Projects</button>
        <button class="nav-btn" data-view="updates">Updates</button>
        <button class="nav-btn" data-view="announcements">Announcements</button>
        <button class="nav-btn" data-view="decisions">Decisions</button>
      </aside>

      <main class="main">
        <section id="view-home" class="view">
          <div class="cards">
            <div class="card glass"><div class="label">Open Tasks</div><div class="value" id="statOpen">0</div></div>
            <div class="card glass"><div class="label">Overdue</div><div class="value" id="statOverdue">0</div></div>
            <div class="card glass"><div class="label">Blocked / Waiting</div><div class="value" id="statBlocked">0</div></div>
            <div class="card glass"><div class="label">Due This Week</div><div class="value" id="statWeek">0</div></div>
          </div>
          <div class="grid-2">
            <div class="panel glass">
              <div class="section-title"><h3>Recent Team Updates</h3><button class="btn btn-soft" onclick="openModal('updateModal')">Post Update</button></div>
              <div id="recentUpdates" class="list"></div>
            </div>
            <div class="panel glass">
              <div class="section-title"><h3>Decisions Needed</h3><button class="btn btn-soft" onclick="openModal('updateModal','decision')">Add Decision</button></div>
              <div id="decisionList" class="list"></div>
            </div>
          </div>
        </section>

        <section id="view-mywork" class="view hidden">
          <div class="section-title"><h2>My Work</h2><button class="btn btn-primary" onclick="openModal('taskModal')">New Task</button></div>
          <div class="panel glass">
            <div id="myWorkTable"></div>
          </div>
        </section>

        <section id="view-projects" class="view hidden">
          <div class="section-title"><h2>Projects</h2><input id="projectSearch" class="field" placeholder="Search projects" oninput="renderProjects()"></div>
          <div class="panel glass"><div id="projectsList" class="list"></div></div>
        </section>

        <section id="view-updates" class="view hidden">
          <div class="section-title"><h2>Updates</h2><button class="btn btn-primary" onclick="openModal('updateModal')">New Update</button></div>
          <div class="panel glass"><div id="updatesList" class="list"></div></div>
        </section>

        <section id="view-announcements" class="view hidden">
          <div class="section-title"><h2>Announcements</h2><button class="btn btn-primary" onclick="openModal('updateModal','announcement')">New Announcement</button></div>
          <div class="panel glass"><div id="announcementsList" class="list"></div></div>
        </section>

        <section id="view-decisions" class="view hidden">
          <div class="section-title"><h2>Decisions</h2><button class="btn btn-primary" onclick="openModal('updateModal','decision')">New Decision</button></div>
          <div class="panel glass"><div id="decisionsPageList" class="list"></div></div>
        </section>
      </main>
    </div>
  </div>

  <div id="projectModal" class="modal-wrap"><div class="modal glass"><div class="section-title"><h2>New Project</h2><button class="btn btn-soft" onclick="closeModal('projectModal')">Close</button></div>
    <div class="form-grid">
      <input id="projectTitle" class="field full" placeholder="Project name / title">
      <input id="projectCategory" class="field" placeholder="Category">
      <select id="projectStatus" class="field"><option value="planning">Planning</option><option value="active">Active</option><option value="paused">Paused</option><option value="completed">Completed</option></select>
      <input id="projectStartDate" type="date" class="field">
      <input id="projectEndDate" type="date" class="field">
      <input id="projectBudget" type="number" min="0" step="1" class="field" placeholder="Budget">
      <input id="projectOwner" class="field" placeholder="Owner">
      <textarea id="projectDescription" class="field full" rows="4" placeholder="Description"></textarea>
    </div>
    <div class="section-title"><span></span><button class="btn btn-primary" onclick="saveProjectForm()">Save Project</button></div>
  </div></div>

  <div id="taskModal" class="modal-wrap"><div class="modal glass"><div class="section-title"><h2>New Task</h2><button class="btn btn-soft" onclick="closeModal('taskModal')">Close</button></div>
    <div class="form-grid">
      <input id="taskProjectTitle" class="field full" placeholder="Project name / title">
      <input id="taskTitle" class="field full" placeholder="Task name">
      <select id="taskProjectId" class="field"><option value="">Link to saved project, optional</option></select>
      <select id="taskAssignee" class="field"></select>
      <select id="taskStatus" class="field"><option value="not_started">Not Started</option><option value="in_progress">In Progress</option><option value="waiting">Waiting</option><option value="blocked">Blocked</option><option value="complete">Complete</option></select>
      <select id="taskPriority" class="field"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select>
      <input id="taskDueDate" type="date" class="field">
      <input id="taskNextStep" class="field full" placeholder="Next step">
      <input id="taskBlocker" class="field full" placeholder="Blocker, if any">
      <textarea id="taskNotes" class="field full" rows="4" placeholder="Notes"></textarea>
    </div>
    <div class="section-title"><span></span><button class="btn btn-primary" onclick="saveTaskForm()">Save Task</button></div>
  </div></div>

  <div id="updateModal" class="modal-wrap"><div class="modal glass"><div class="section-title"><h2>New Update</h2><button class="btn btn-soft" onclick="closeModal('updateModal')">Close</button></div>
    <div class="form-grid">
      <select id="updateType" class="field"><option value="update">Update</option><option value="announcement">Announcement</option><option value="decision">Decision Needed</option><option value="blocker">Blocker</option><option value="completed">Completed</option><option value="handoff">Handoff</option></select>
      <select id="updateProjectId" class="field"><option value="">Link to saved project, optional</option></select>
      <input id="updateProjectTitle" class="field full" placeholder="Project name / title">
      <textarea id="updateMessage" class="field full" rows="4" placeholder="Write the update"></textarea>
      <select id="decisionOwner" class="field"><option value="">Decision owner, optional</option></select>
      <input id="decisionDueDate" type="date" class="field">
    </div>
    <div class="section-title"><span></span><button class="btn btn-primary" onclick="saveUpdateForm()">Save Update</button></div>
  </div></div>

  <div id="teamModal" class="modal-wrap"><div class="modal glass"><div class="section-title"><h2>Team</h2><button class="btn btn-soft" onclick="closeModal('teamModal')">Close</button></div>
    <div class="row" style="margin-bottom:12px"><input id="teamName" class="field" placeholder="Add team member"><button class="btn btn-primary" onclick="saveTeamForm()">Add</button></div>
    <div id="teamList" class="list"></div>
  </div></div>

  <div id="toast" class="toast"></div>

  <script>
    const app = { data: {team:[],projects:[],tasks:[],updates:[]}, currentView:'home', currentUser:'' };

    document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => switchView(btn.dataset.view)));

    function switchView(view){
      app.currentView = view;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById('view-' + view).classList.remove('hidden');
      render();
    }

    function openModal(id, presetType){ document.getElementById(id).style.display='flex'; if(id==='updateModal' && presetType) document.getElementById('updateType').value=presetType; }
    function closeModal(id){ document.getElementById(id).style.display='none'; }
    function toast(msg, bad){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; t.style.background=bad?'var(--danger)':'var(--sage)'; setTimeout(()=>t.style.display='none',2500); }

    function rpc(name, payload){
      return new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](payload);
      });
    }

    async function init(){
      try {
        await rpc('setupWorkbook');
        await refresh();
      } catch (e) { console.error(e); toast('Failed to load data', true); }
    }

    async function refresh(){
      app.data = await rpc('getAppData');
      const activeTeam = app.data.team.filter(t => t.active !== false);
      if (!app.currentUser) app.currentUser = activeTeam[0]?.name || '';
      populateUserDropdowns();
      render();
    }

    function populateUserDropdowns(){
      const names = app.data.team.filter(t => t.active !== false).map(t => t.name);
      ['currentUser','taskAssignee','decisionOwner'].forEach(id => {
        const el = document.getElementById(id); if(!el) return;
        const current = id==='currentUser' ? app.currentUser : el.value;
        el.innerHTML = names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
        if (names.includes(current)) el.value = current;
      });
      document.getElementById('currentUser').onchange = (e)=>{ app.currentUser=e.target.value; render(); };

      const projectOptions = ['taskProjectId','updateProjectId'].map(id => document.getElementById(id));
      projectOptions.forEach(el => {
        const first = `<option value="">Link to saved project, optional</option>`;
        const rest = app.data.projects.map(p => `<option value="${p.id}">${escapeHtml(p.title)}</option>`).join('');
        el.innerHTML = first + rest;
      });
    }

    function render(){ renderStats(); renderHome(); renderMyWork(); renderProjects(); renderUpdates(); renderAnnouncements(); renderDecisions(); renderTeam(); }

    function renderStats(){
      const now = startOfDay(new Date());
      const weekEnd = new Date(now); weekEnd.setDate(now.getDate()+7);
      const openTasks = app.data.tasks.filter(t => t.status !== 'complete').length;
      const overdue = app.data.tasks.filter(t => t.status !== 'complete' && t.dueDate && startOfDay(new Date(t.dueDate)) < now).length;
      const blocked = app.data.tasks.filter(t => ['blocked','waiting'].includes(t.status)).length;
      const dueWeek = app.data.tasks.filter(t => t.status !== 'complete' && t.dueDate && startOfDay(new Date(t.dueDate)) >= now && startOfDay(new Date(t.dueDate)) <= weekEnd).length;
      setText('statOpen', openTasks); setText('statOverdue', overdue); setText('statBlocked', blocked); setText('statWeek', dueWeek);
      setText('navHomeCount', overdue ? overdue + ' overdue' : '');
      setText('navMyCount', app.data.tasks.filter(t => t.assignee === app.currentUser && t.status !== 'complete').length + ' open');
    }

    function renderHome(){
      const updates = [...app.data.updates].sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
      const decisions = app.data.updates.filter(u => u.type==='decision').sort((a,b)=> new Date(a.decisionDueDate||'9999-12-31') - new Date(b.decisionDueDate||'9999-12-31')).slice(0,6);
      renderUpdateList('recentUpdates', updates, 'No updates yet.');
      renderUpdateList('decisionList', decisions, 'No decisions waiting.');
    }

    function renderMyWork(){
      const rows = app.data.tasks.filter(t => t.assignee === app.currentUser).sort((a,b)=> sortDate(a.dueDate)-sortDate(b.dueDate));
      if (!rows.length) return document.getElementById('myWorkTable').innerHTML = '<div class="empty">No tasks assigned yet.</div>';
      document.getElementById('myWorkTable').innerHTML = `
        <table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Due</th><th>Next Step</th></tr></thead><tbody>
        ${rows.map(t => `<tr>
          <td><strong>${escapeHtml(t.title)}</strong><div class="small muted">Created by ${escapeHtml(t.createdBy||'')}</div></td>
          <td>${escapeHtml(t.projectTitle||'')}</td>
          <td>${pill(t.status)}</td>
          <td>${pill(t.priority)}</td>
          <td>${formatDate(t.dueDate)}</td>
          <td>${escapeHtml(t.nextStep||'')}</td>
        </tr>`).join('')}</tbody></table>`;
    }

    function renderProjects(){
      const q = (document.getElementById('projectSearch')?.value || '').toLowerCase();
      const projects = app.data.projects.filter(p => (p.title||'').toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q));
      const container = document.getElementById('projectsList');
      if (!projects.length) return container.innerHTML = '<div class="empty">No projects found.</div>';
      container.innerHTML = projects.map(p => {
        const tasks = app.data.tasks.filter(t => t.projectId === p.id || (!t.projectId && t.projectTitle === p.title));
        const updates = app.data.updates.filter(u => u.projectId === p.id || (!u.projectId && u.projectTitle === p.title)).slice(0,3);
        return `<div class="item"><div class="row"><div><h3>${escapeHtml(p.title)}</h3><div class="meta"><span>${escapeHtml(p.category||'')}</span><span>Owner: ${escapeHtml(p.owner||'')}</span><span>Ends: ${formatDate(p.endDate)}</span></div></div>${pill(p.status)}</div>
          <div class="small" style="margin-top:8px">${escapeHtml(p.description||'')}</div>
          <div class="row" style="margin-top:12px"><div class="meta"><span>${tasks.length} tasks</span><span>Budget: ${money(p.budget)}</span></div><button class="btn btn-soft" onclick="prefillTaskFromProject('${p.id}','${escapeJs(p.title)}')">Add Task</button></div>
          ${updates.length ? `<div class="list" style="margin-top:12px">${updates.map(u => `<div class="item"><div class="row"><strong>${labelType(u.type)}</strong><span class="small muted">${formatDateTime(u.createdAt)}</span></div><div class="small">${escapeHtml(u.message)}</div></div>`).join('')}</div>` : ''}
        </div>`;
      }).join('');
    }

    function renderUpdates(){
      const updates = app.data.updates.filter(u => u.type !== 'announcement' && u.type !== 'decision').sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
      renderUpdateList('updatesList', updates, 'No updates yet.');
    }

    function renderAnnouncements(){
      const items = app.data.updates.filter(u => u.type === 'announcement').sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
      renderUpdateList('announcementsList', items, 'No announcements yet.');
    }

    function renderDecisions(){
      const items = app.data.updates.filter(u => u.type === 'decision').sort((a,b)=> sortDate(a.decisionDueDate)-sortDate(b.decisionDueDate));
      renderUpdateList('decisionsPageList', items, 'No decisions waiting.');
    }

    function renderTeam(){
      const team = app.data.team.filter(t => t.active !== false);
      const el = document.getElementById('teamList');
      el.innerHTML = team.length ? team.map(t => `<div class="item"><div class="row"><div><strong>${escapeHtml(t.name)}</strong><div class="small muted">Added ${formatDateTime(t.createdAt)}</div></div><button class="btn btn-danger" onclick="archiveTeam('${t.id}')">Remove</button></div></div>`).join('') : '<div class="empty">No team members yet.</div>';
    }

    function renderUpdateList(id, list, emptyText){
      const el = document.getElementById(id);
      if (!list.length) return el.innerHTML = `<div class="empty">${emptyText}</div>`;
      el.innerHTML = list.map(u => `<div class="item"><div class="row"><div>${pill(u.type)} <strong style="margin-left:8px">${escapeHtml(u.projectTitle || lookupProjectTitle(u.projectId) || 'General')}</strong></div><span class="small muted">${formatDateTime(u.createdAt)}</span></div><div style="margin-top:8px">${escapeHtml(u.message)}</div><div class="meta" style="margin-top:8px"><span>By ${escapeHtml(u.author || '')}</span>${u.decisionOwner ? `<span>Decision owner: ${escapeHtml(u.decisionOwner)}</span>`:''}${u.decisionDueDate ? `<span>Due: ${formatDate(u.decisionDueDate)}</span>`:''}</div></div>`).join('');
    }

    async function saveProjectForm(){
      const payload = { title: val('projectTitle'), category: val('projectCategory'), status: val('projectStatus'), startDate: val('projectStartDate'), endDate: val('projectEndDate'), budget: val('projectBudget'), owner: val('projectOwner'), description: val('projectDescription'), createdBy: app.currentUser };
      if (!payload.title) return toast('Project title is required.', true);
      await rpc('saveProject', payload); closeModal('projectModal'); clearProjectForm(); await refresh(); toast('Project saved.');
    }

    async function saveTaskForm(){
      const projectId = val('taskProjectId');
      const payload = { projectId, projectTitle: val('taskProjectTitle') || lookupProjectTitle(projectId), title: val('taskTitle'), assignee: val('taskAssignee'), createdBy: app.currentUser, status: val('taskStatus'), priority: val('taskPriority'), dueDate: val('taskDueDate'), blocker: val('taskBlocker'), nextStep: val('taskNextStep'), notes: val('taskNotes') };
      if (!payload.title) return toast('Task name is required.', true);
      if (!payload.projectTitle) return toast('Enter a project name or link a saved project.', true);
      await rpc('saveTask', payload); closeModal('taskModal'); clearTaskForm(); await refresh(); toast('Task saved.');
    }

    async function saveUpdateForm(){
      const projectId = val('updateProjectId');
      const payload = { projectId, projectTitle: val('updateProjectTitle') || lookupProjectTitle(projectId), type: val('updateType'), message: val('updateMessage'), author: app.currentUser, decisionOwner: val('decisionOwner'), decisionDueDate: val('decisionDueDate') };
      if (!payload.message) return toast('Update text is required.', true);
      await rpc('saveUpdate', payload); closeModal('updateModal'); clearUpdateForm(); await refresh(); toast('Update saved.');
    }

    async function saveTeamForm(){
      const name = val('teamName').trim(); if (!name) return toast('Enter a name.', true);
      await rpc('saveTeamMember', { name }); document.getElementById('teamName').value=''; await refresh(); toast('Team member added.');
    }

    async function archiveTeam(id){ await rpc('archiveTeamMember', id); await refresh(); toast('Team member removed.'); }
    async function seedData(){ const res = await rpc('seedSampleData'); await refresh(); toast(res.message || 'Done.'); }

    function prefillTaskFromProject(id,title){ document.getElementById('taskProjectId').value=id; document.getElementById('taskProjectTitle').value=title; openModal('taskModal'); }
    function lookupProjectTitle(id){ return app.data.projects.find(p => p.id === id)?.title || ''; }
    function labelType(type){ return type === 'decision' ? 'Decision Needed' : type.charAt(0).toUpperCase()+type.slice(1); }
    function pill(value){ return `<span class="pill ${String(value).replace(/\s+/g,'_').toLowerCase()}">${labelType(String(value).replace(/_/g,' '))}</span>`; }
    function setText(id, value){ document.getElementById(id).textContent = value; }
    function money(v){ const n = Number(v||0); return n ? '$' + n.toLocaleString() : '$0'; }
    function formatDate(v){ if(!v) return '—'; const d = new Date(v); return isNaN(d)? '—' : d.toLocaleDateString(); }
    function formatDateTime(v){ if(!v) return '—'; const d = new Date(v); return isNaN(d)? '—' : d.toLocaleString(); }
    function sortDate(v){ const d = new Date(v || '9999-12-31'); return isNaN(d) ? new Date('9999-12-31') : d; }
    function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function val(id){ return document.getElementById(id).value; }
    function clearProjectForm(){ ['projectTitle','projectCategory','projectStartDate','projectEndDate','projectBudget','projectOwner','projectDescription'].forEach(id=>document.getElementById(id).value=''); document.getElementById('projectStatus').value='planning'; }
    function clearTaskForm(){ ['taskProjectTitle','taskTitle','taskDueDate','taskNextStep','taskBlocker','taskNotes'].forEach(id=>document.getElementById(id).value=''); document.getElementById('taskProjectId').value=''; document.getElementById('taskStatus').value='not_started'; document.getElementById('taskPriority').value='medium'; }
    function clearUpdateForm(){ ['updateProjectTitle','updateMessage','decisionDueDate'].forEach(id=>document.getElementById(id).value=''); document.getElementById('updateProjectId').value=''; document.getElementById('updateType').value='update'; document.getElementById('decisionOwner').value=''; }
    function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeJs(s=''){ return String(s).replace(/'/g, "\\'"); }
    window.addEventListener('load', init);
  </script>
</body>
</html>
